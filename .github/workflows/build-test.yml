name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libsqlite3-dev libssl-dev libcurl4-openssl-dev git

      - name: Setup environment
        run: |
          sudo mkdir -p /srv/containercp/sites
          sudo chmod -R 777 /srv/containercp

      - name: Build c-ares from source
        run: |
          curl -sL https://github.com/c-ares/c-ares/archive/refs/tags/v1.34.4.tar.gz | tar xz
          cd c-ares-1.34.4
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          sudo ninja -C build install
          sudo ldconfig

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: ninja -C build -j2 containercp_tests

      - name: Test
        run: sudo ./build/tests/containercp_tests
