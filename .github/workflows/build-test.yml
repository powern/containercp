name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libsqlite3-dev libssl-dev git

      - name: Build c-ares from source
        run: |
          curl -sL https://github.com/c-ares/c-ares/archive/refs/tags/v1.34.4.tar.gz | tar xz
          cd c-ares-1.34.4
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          sudo ninja -C build install

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: ninja -C build -j1 containercpd containercp_tests 2>&1 | tail -20

      - name: Test
        run: ./build/tests/containercp_tests -s
